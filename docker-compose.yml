version: "3.9"

services:

  ############################
  # OpenTelemetry Collector  #
  ############################
  otel-collector:
    build:
      context: ./otel-collector
    container_name: otel-collector
    ports:
      - "4317:4317"
      - "4318:4318"
      - "8888:8888"
    depends_on:
      - tempo
      - loki
      - prometheus
    networks:
      - observability

  ############################
  # Tempo (Tracing)          #
  ############################
  tempo:
    build:
      context: ./tempo
    container_name: tempo
    ports:
      - "3200:3200"
      - "9095:9095"
    volumes:
      - ./run/tempo:/var/tempo
      - ./run/tempo/metrics_traces:/var/tempo/generator/traces
      - ./run/tempo/metrics_wal:/var/tempo/generator/wal
    networks:
      - observability

  ############################
  # Loki (Logs)              #
  ############################
  loki:
    build:
      context: ./loki
    container_name: loki
    ports:
      - "3100:3100"
    volumes:
      - ./run/loki:/loki
    networks:
      - observability

  ############################
  # Prometheus (Metrics)     #
  ############################
  prometheus:
    build:
      context: ./prometheus
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./run/prometheus:/prometheus
    networks:
      - observability

  ############################
  # Grafana (UI)             #
  ############################
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    ports:
      - "3000:3000"
    volumes:
      - ./run/grafana:/var/lib/grafana
    depends_on:
      - prometheus
      - loki
      - tempo
    networks:
      - observability

networks:
  observability: